<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M&A — Acquisition Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg-surface: #fafaf7;
  --bg-tertiary: #f0efea;
  --text-primary: #1a1a18;
  --text-secondary: #5e5e58;
  --text-tertiary: #98978d;
  --border: #ebeae3;
  --border-hover: #d0cfc7;
  --brand: #534AB7;
  --brand-dark: #3C3489;
  --brand-light: #EEEDFE;
  --brand-soft: rgba(83, 74, 183, 0.06);
  --brand-soft-2: rgba(83, 74, 183, 0.12);
  --brand-border: rgba(83, 74, 183, 0.22);
  --info-bg: #E6F1FB;
  --info-text: #185FA5;
  --info-strong: #378ADD;
  --success-bg: #EAF3DE;
  --success-text: #3B6D11;
  --success-strong: #639922;
  --danger-bg: #FCEBEB;
  --danger-text: #A32D2D;
  --danger-strong: #E24B4A;
  --warning-bg: #FAEEDA;
  --warning-text: #854F0B;
  --warning-strong: #BA7517;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.app {
  display: flex;
  max-width: 1320px;
  width: 100%;
  margin: 24px auto;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  min-height: calc(100vh - 48px);
}
.sidebar {
  width: 240px;
  flex-shrink: 0;
  padding: 16px 12px;
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: var(--bg);
}
.sidebar-title {
  padding: 6px 12px 18px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.005em;
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 12px;
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  color: var(--brand);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: background 0.12s ease;
}
.nav-btn:hover { background: var(--brand-soft); }
.nav-btn.active {
  background: var(--brand);
  color: #ffffff;
}
.nav-btn.active:hover { background: var(--brand-dark); }
.main {
  flex: 1;
  min-width: 0;
  padding: 28px 36px 48px;
  background: var(--bg);
}
.page-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.page-title-block {
  margin-bottom: 24px;
}
.page-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.015em;
  margin: 0 0 6px;
}
.page-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
}
.crumb {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text-secondary);
  text-decoration: none;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: inherit;
  padding: 4px 0;
}
.crumb:hover { color: var(--text-primary); }
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--brand);
  color: #ffffff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s;
}
.btn-primary:hover { background: var(--brand-dark); }
.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  background: transparent;
  color: var(--brand);
  border: 0.5px solid var(--brand-border);
  border-radius: var(--radius-md);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s;
}
.btn-ghost:hover { background: var(--brand-soft); }
.pip {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 999px;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  letter-spacing: 0;
}
.pip-info { background: var(--info-bg); color: var(--info-text); }
.pip-success { background: var(--success-bg); color: var(--success-text); }
.pip-danger { background: var(--danger-bg); color: var(--danger-text); }
.pip-warning { background: var(--warning-bg); color: var(--warning-text); }
.pip-brand { background: var(--brand-soft-2); color: var(--brand); }
.av {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-secondary);
  flex-shrink: 0;
}
.av-stack { display: flex; }
.av-stack .av { width: 24px; height: 24px; font-size: 9px; border: 1.5px solid var(--bg); }
.av-stack .av + .av { margin-left: -7px; }
.av-stack .av-overflow { background: var(--bg-tertiary); color: var(--text-tertiary); }
.section-h {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin: 0 0 12px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
}
.section-h-link {
  color: var(--text-tertiary);
  font-weight: 400;
  cursor: pointer;
  text-decoration: none;
}
.section-h-link:hover { color: var(--text-primary); }
.brand-tag {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--brand-soft-2);
  color: var(--brand);
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.stage-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-tertiary);
  padding: 0 6px 12px;
  letter-spacing: 0.01em;
}
.round-row {
  padding: 14px 16px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border);
  background: var(--bg);
  cursor: pointer;
  transition: border-color 0.14s ease, background 0.14s ease;
}
.round-row:hover {
  border-color: var(--brand-border);
  background: var(--brand-soft);
}
.round-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.round-title-text {
  flex: 1;
  min-width: 0;
  font-weight: 500;
  font-size: 14px;
  color: var(--text-primary);
}
.round-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.round-meta-text {
  font-size: 12px;
  color: var(--text-tertiary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.date-cell {
  font-size: 11px;
  color: var(--text-tertiary);
  min-width: 36px;
  text-align: right;
}
.progress {
  display: flex;
  gap: 4px;
}
.seg {
  flex: 1;
  height: 6px;
  border-radius: 2px;
  background: var(--border);
}
.seg-info { background: var(--info-strong); }
.seg-success { background: var(--success-strong); }
.seg-danger { background: var(--danger-strong); }
.seg-warning { background: var(--warning-strong); }
.ai-card {
  background: var(--brand-soft);
  border: 0.5px solid var(--brand-border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  margin-bottom: 24px;
}
.ai-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  color: var(--brand);
  margin-bottom: 8px;
}
.ai-card p {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-primary);
  margin: 0;
}
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 24px;
}
.insight-box {
  padding: 16px 18px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border);
  background: var(--bg);
}
.insight-box-h {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  color: var(--brand);
  margin-bottom: 14px;
}
.insight-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.insight-item { display: flex; gap: 10px; align-items: flex-start; }
.insight-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--brand);
  margin-top: 7px;
  flex-shrink: 0;
}
.insight-text {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.5;
}
.insight-reason {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 3px;
  line-height: 1.4;
}
.suggestions-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.sugg-card {
  padding: 14px 16px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.12s;
}
.sugg-card:hover { border-color: var(--border-hover); }
.sugg-head { display: flex; align-items: center; gap: 8px; }
.sugg-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.sugg-industry { font-size: 11px; color: var(--text-tertiary); }
.sugg-metric { font-size: 12px; color: var(--text-primary); }
.sugg-why {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.5;
  padding: 8px 10px;
  background: var(--bg-surface);
  border-radius: var(--radius-md);
}
.cands-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.cand-row {
  padding: 12px 14px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border);
  transition: border-color 0.12s;
  background: var(--bg);
}
.cand-row.leading {
  background: var(--brand-soft);
  border-color: var(--brand-border);
}
.cand-row:hover { border-color: var(--border-hover); }
.cand-row.leading:hover { border-color: var(--brand); }
.cand-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.cand-info { flex: 1; min-width: 0; }
.cand-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.cand-name { font-weight: 500; font-size: 14px; color: var(--text-primary); }
.cand-name.eliminated {
  text-decoration: line-through;
  text-decoration-color: var(--text-tertiary);
}
.cand-detail { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
.cand-stage { font-size: 11px; color: var(--text-tertiary); }
.list-rows {
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.list-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
}
.list-row:last-child { border-bottom: none; }
.list-row-icon { color: var(--text-tertiary); flex-shrink: 0; margin-top: 1px; }
.list-row-text { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.list-row-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.list-row-content { flex: 1; min-width: 0; }
.checkbox {
  width: 14px;
  height: 14px;
  border: 1.5px solid var(--text-tertiary);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 2px;
}
.checkbox.done {
  background: var(--success-strong);
  border-color: var(--success-strong);
  display: flex;
  align-items: center;
  justify-content: center;
}
.task-text.done {
  color: var(--text-tertiary);
  text-decoration: line-through;
  font-weight: 400;
}
.topics-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.topic {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
  color: var(--text-secondary);
}
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-tertiary);
}
.empty-state h3 {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.empty-state p { font-size: 13px; }
/* Candidate detail page */
.cand-identity {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
}
.cand-identity .av {
  width: 56px;
  height: 56px;
  font-size: 16px;
}
.cand-identity h1 {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.015em;
  color: var(--text-primary);
  margin: 0 0 6px;
}
.cand-identity .meta {
  font-size: 13px;
  color: var(--text-secondary);
}
.cand-progress-block {
  margin-bottom: 24px;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  border: 0.5px solid var(--border);
  background: var(--bg);
}
.cand-progress-block .progress { margin-top: 10px; }
.cand-progress-stages {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-tertiary);
  margin-top: 8px;
}
.reasoning-card {
  background: var(--brand-soft);
  border: 0.5px solid var(--brand-border);
  border-radius: var(--radius-md);
  padding: 18px 20px;
  margin-bottom: 24px;
}
.reasoning-card h3 {
  font-size: 14px;
  font-weight: 500;
  color: var(--brand);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.reasoning-points {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.reasoning-point {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.reasoning-point .num {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--brand);
  color: #fff;
  font-size: 10px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.reasoning-point-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 3px;
}
.reasoning-point-detail {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
.metric-card {
  padding: 12px 14px;
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
}
.metric-label {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 4px;
}
.metric-value {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-primary);
}
.metric-value.positive { color: var(--success-text); }
.sc-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sc-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
  font-size: 13px;
  color: var(--text-primary);
}
.sc-item .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.sc-item .dot.s { background: var(--success-strong); }
.sc-item .dot.c { background: var(--warning-strong); }
.timeline-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-left: 1.5px solid var(--border);
  padding-left: 16px;
  margin-left: 6px;
}
.timeline-item {
  position: relative;
  padding: 6px 0 14px;
}
.timeline-item:last-child { padding-bottom: 0; }
.timeline-item:before {
  content: '';
  position: absolute;
  left: -22px;
  top: 10px;
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--bg);
  border: 1.5px solid var(--brand);
}
.timeline-item.first:before { background: var(--brand); }
.timeline-date {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  margin-bottom: 2px;
}
.timeline-event {
  font-size: 13px;
  color: var(--text-primary);
}
.cand-row.clickable { cursor: pointer; }
/* Sherpany brand */
.sidebar-brand {
  padding: 6px 12px 22px;
}
.logo-img {
  height: 36px;
  width: auto;
  max-width: 180px;
  display: block;
  margin-bottom: 8px;
}
.logo-tag {
  font-size: 9px;
  color: var(--text-tertiary);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
/* Sync with Datasite Pipeline button — yellow */
.btn-sync-grata {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 14px;
  background: #FACC15;
  color: #1a1a18;
  border: 0.5px solid #EAB308;
  border-radius: var(--radius-md);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
  line-height: 1;
}
.btn-sync-grata:hover { background: #EAB308; border-color: #CA8A04; }
.btn-sync-grata .partner-logo {
  height: 16px;
  width: auto;
  display: inline-block;
  vertical-align: middle;
  margin: 0 1px;
}
.sync-status {
  font-size: 10px;
  color: rgba(26, 26, 24, 0.55);
  margin-left: 4px;
}
/* Responsible-person block */
.responsible-block {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--brand-soft);
  border: 0.5px solid var(--brand-border);
  border-radius: var(--radius-md);
  margin-bottom: 24px;
}
.responsible-block .av {
  width: 40px;
  height: 40px;
  font-size: 12px;
  background: var(--bg);
  border-color: var(--brand-border);
  color: var(--brand);
}
.resp-content { flex: 1; min-width: 0; }
.resp-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.resp-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.resp-role { font-size: 12px; color: var(--text-secondary); }
.resp-action { font-size: 13px; color: var(--text-primary); margin-bottom: 3px; line-height: 1.45; }
.resp-due {
  font-size: 11px;
  color: var(--text-tertiary);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.resp-due .overdue { color: var(--danger-text); font-weight: 500; }
.btn-meeting {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg);
  color: var(--brand);
  border: 0.5px solid var(--brand-border);
  border-radius: var(--radius-md);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
  flex-shrink: 0;
  white-space: nowrap;
}
.btn-meeting:hover {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
/* Next step block — subordinate, sits below current responsible */
.next-step-block {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px 12px 18px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-left: 2px solid var(--brand-border);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  margin: -16px 0 24px 16px;
}
.next-step-block .av {
  width: 28px;
  height: 28px;
  font-size: 10px;
  background: var(--bg-surface);
}
.next-step-content { flex: 1; min-width: 0; }
.next-step-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
  flex-wrap: wrap;
}
.next-step-label {
  font-size: 9px;
  font-weight: 500;
  color: var(--brand);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.next-step-name {
  font-size: 13px;
  color: var(--text-primary);
  font-weight: 500;
}
.next-step-role {
  font-size: 12px;
  color: var(--text-secondary);
}
.next-step-stage {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--bg-surface);
  color: var(--text-secondary);
  border: 0.5px solid var(--border);
}
.next-step-action {
  font-size: 13px;
  color: var(--text-primary);
  margin-bottom: 3px;
  line-height: 1.5;
}
.next-step-expected {
  font-size: 11px;
  color: var(--text-tertiary);
}
/* ============================================================================ */
/* BOARD REPORT — SLIDE DECK STYLE                                              */
/* ============================================================================ */
.report-page { max-width: none; margin: 0; }
.report-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
  margin: -24px -24px 0;
}
.report-actions-left { display: flex; align-items: center; gap: 16px; }
.slide-counter {
  font-size: 11px;
  color: var(--text-tertiary);
  font-feature-settings: 'tnum';
  letter-spacing: 0.04em;
}
.report-actions-right { display: flex; gap: 8px; }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  background: var(--bg);
  color: var(--text-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
}
.btn-secondary:hover { background: var(--bg-surface); border-color: var(--border-hover); }

/* Slide container */
.slide {
  padding: 56px 64px;
  border-bottom: 0.5px solid var(--border);
  position: relative;
  margin: 0 -24px;
}
.slide:last-child { border-bottom: none; }
.slide-num {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  font-feature-settings: 'tnum';
}
.slide-title {
  font-size: 30px;
  font-weight: 500;
  letter-spacing: -0.022em;
  color: var(--text-primary);
  margin: 0 0 36px;
  line-height: 1.1;
}

/* Cover slide */
.slide-cover {
  background: var(--text-primary);
  color: #fff;
  padding: 80px 64px;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 56px;
  align-items: end;
  min-height: 380px;
}
.cover-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.5);
  margin-bottom: 22px;
}
.cover-title {
  font-size: 46px;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1.05;
  color: #fff;
  margin: 0 0 14px;
}
.cover-subtitle {
  font-size: 16px;
  color: rgba(255,255,255,0.78);
  font-style: italic;
  line-height: 1.5;
  max-width: 480px;
}
.cover-meta {
  border-left: 1px solid rgba(255,255,255,0.15);
  padding-left: 32px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.cover-meta-item .label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 4px;
}
.cover-meta-item .value {
  font-size: 14px;
  font-weight: 500;
  color: #fff;
}
.cover-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  background: rgba(255,255,255,0.1);
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  color: #fff;
  letter-spacing: 0.02em;
  width: fit-content;
}
.cover-status-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--brand);
}
.cover-status-badge.success .dot { background: var(--success-text); }
.cover-status-badge.danger .dot { background: var(--danger-text); }
.cover-status-badge.warning .dot { background: var(--warning-text); }

/* Executive summary slide */
.slide-exec { background: var(--bg-surface); }
.exec-headline {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.018em;
  line-height: 1.3;
  color: var(--text-primary);
  margin-bottom: 22px;
  max-width: 760px;
}
.exec-headline em {
  font-style: normal;
  background: linear-gradient(180deg, transparent 60%, var(--brand-soft) 60%);
  padding: 0 2px;
}
.exec-detail {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-secondary);
  max-width: 780px;
}

/* Pillars (strategic rationale) */
.pillars-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.pillar {
  padding: 22px 20px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  border-top: 3px solid var(--brand);
  position: relative;
}
.pillar-num {
  position: absolute;
  top: 14px;
  right: 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  font-feature-settings: 'tnum';
}
.pillar-icon {
  width: 40px; height: 40px;
  background: var(--brand-soft);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--brand);
  margin-bottom: 14px;
}
.pillar-title {
  font-size: 15px; font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 6px;
  letter-spacing: -0.005em;
}
.pillar-text {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.55;
}
.rationale-detail {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text-secondary);
  max-width: 800px;
  padding-top: 18px;
  border-top: 0.5px solid var(--border);
}

/* Status pipeline */
.slide-status { background: var(--bg-surface); }
.pipeline {
  display: flex;
  align-items: flex-start;
  margin: 0 0 36px;
  padding: 28px 8px 0;
  position: relative;
}
.pipe-stage {
  flex: 1;
  text-align: center;
  position: relative;
}
.pipe-stage::after {
  content: '';
  position: absolute;
  top: 18px;
  left: 50%;
  width: 100%;
  height: 2px;
  background: var(--border);
  z-index: 0;
}
.pipe-stage:last-child::after { display: none; }
.pipe-stage.done::after, .pipe-stage.current::after { background: var(--brand); }
.pipe-stage.terminal::after { background: var(--border); }
.pipe-stage .dot {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--border);
  margin: 0 auto 12px;
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-tertiary);
  font-weight: 500;
  font-size: 13px;
}
.pipe-stage.done .dot {
  background: var(--brand); border-color: var(--brand); color: #fff;
}
.pipe-stage.current .dot {
  background: var(--brand); border-color: var(--brand); color: #fff;
  width: 46px; height: 46px;
  margin-top: -4px;
  box-shadow: 0 0 0 5px var(--brand-soft);
}
.pipe-stage.terminal-success .dot {
  background: var(--success-text); border-color: var(--success-text); color: #fff;
}
.pipe-stage.terminal-danger .dot {
  background: var(--danger-text); border-color: var(--danger-text); color: #fff;
}
.pipe-stage .name {
  font-size: 11.5px; font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: -0.005em;
}
.pipe-stage.current .name { color: var(--brand); font-weight: 600; }
.pipe-stage.done .name { color: var(--text-primary); }
.pipe-stage .sub {
  font-size: 10px;
  color: var(--text-tertiary);
  margin-top: 2px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.status-headline {
  font-size: 22px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 10px;
  letter-spacing: -0.012em;
}
.status-detail {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
  max-width: 760px;
}

/* Financial slide — headline metric */
.headline-metric {
  text-align: center;
  padding: 44px 24px 36px;
  background: linear-gradient(180deg, var(--brand-soft) 0%, transparent 100%);
  border-radius: var(--radius-md);
  margin-bottom: 32px;
  border: 0.5px solid var(--brand-border);
}
.hm-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 18px;
}
.hm-value {
  font-size: 72px;
  font-weight: 600;
  letter-spacing: -0.045em;
  color: var(--brand);
  line-height: 1;
  margin-bottom: 14px;
  font-feature-settings: 'tnum';
}
.hm-sub {
  font-size: 13.5px;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.5;
}

/* Price scenarios bar chart */
.scenarios {
  margin: 0 0 36px;
  padding: 24px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
}
.scenarios-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 20px;
}
.scenario {
  margin-bottom: 16px;
}
.scenario:last-child { margin-bottom: 0; }
.scenario-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.scenario-label {
  font-size: 12.5px;
  color: var(--text-secondary);
}
.scenario-value {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  font-feature-settings: 'tnum';
  letter-spacing: -0.01em;
}
.scenario-track {
  height: 10px;
  background: var(--bg-surface);
  border-radius: 999px;
  overflow: hidden;
}
.scenario-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.scenario.target .scenario-fill { background: var(--bg-tertiary); }
.scenario.target .scenario-value { color: var(--text-secondary); }
.scenario.recommended .scenario-fill { background: var(--success-text); }
.scenario.ask .scenario-fill { background: var(--warning-text); }
.scenario.envelope .scenario-fill { background: var(--brand); }

/* Financial supporting metrics */
.fin-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.fin-metric {
  padding: 14px 16px;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
}
.fin-metric-label {
  font-size: 10.5px;
  color: var(--text-tertiary);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
.fin-metric-value {
  font-size: 17px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  font-feature-settings: 'tnum';
}
.fin-metric-sub {
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.4;
}

/* Risk slide */
.slide-risk { background: var(--bg-surface); }
.risk-grid { display: grid; gap: 12px; }
.risk-card {
  display: flex;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.risk-card-bar { width: 5px; flex-shrink: 0; }
.risk-card-bar.high { background: var(--danger-text); }
.risk-card-bar.medium { background: var(--warning-text); }
.risk-card-bar.low { background: var(--success-text); }
.risk-card-content { flex: 1; padding: 16px 20px; }
.risk-card-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.risk-card-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.risk-card-icon.high { background: var(--danger-bg); color: var(--danger-text); }
.risk-card-icon.medium { background: var(--warning-bg); color: var(--warning-text); }
.risk-card-icon.low { background: var(--success-bg); color: var(--success-text); }
.risk-card-level {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.risk-card-level.high { color: var(--danger-text); }
.risk-card-level.medium { color: var(--warning-text); }
.risk-card-level.low { color: var(--success-text); }
.risk-card-text {
  font-size: 14px;
  color: var(--text-primary);
  font-weight: 500;
  flex: 1;
  line-height: 1.4;
}
.risk-card-mit {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.55;
  padding-left: 40px;
}
.risk-card-mit-label {
  font-weight: 600;
  color: var(--text-primary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 9.5px;
  margin-right: 6px;
}

/* Decisions slide */
.decisions-grid { display: grid; gap: 10px; }
.decision-card {
  display: flex;
  align-items: stretch;
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.decision-card.critical {
  background: var(--brand-soft);
  border-color: var(--brand-border);
  border-left: 3px solid var(--brand);
}
.decision-card-num {
  width: 64px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 600;
  color: var(--text-tertiary);
  font-feature-settings: 'tnum';
  border-right: 0.5px solid var(--border);
}
.decision-card.critical .decision-card-num {
  color: var(--brand);
  border-right-color: var(--brand-border);
}
.decision-card-body {
  flex: 1;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.decision-card-tags {
  display: flex; gap: 8px;
  margin-bottom: 6px;
}
.decision-card-tag {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 999px;
  border: 0.5px solid var(--border);
  color: var(--text-tertiary);
  background: var(--bg-surface);
}
.decision-card.critical .decision-card-tag.kind {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
}
.decision-card-ask {
  font-size: 14.5px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.005em;
  line-height: 1.45;
}

/* Recommendation slide (final) */
.slide-rec {
  background: var(--text-primary);
  color: #fff;
  padding: 72px 64px;
}
.slide-rec .slide-num { color: rgba(255,255,255,0.4); }
.slide-rec .slide-title { color: #fff; margin-bottom: 28px; }
.rec-statement {
  font-size: 24px;
  font-weight: 400;
  line-height: 1.55;
  color: #fff;
  letter-spacing: -0.008em;
  max-width: 820px;
}
.rec-mark {
  width: 38px; height: 4px;
  background: var(--brand);
  margin-bottom: 28px;
  border-radius: 2px;
}
.report-footer {
  text-align: center;
  font-size: 10px;
  color: var(--text-tertiary);
  padding: 18px;
  background: var(--bg);
  letter-spacing: 0.06em;
  margin: 0 -24px -24px;
}

@media print {
  body { background: #fff; }
  .app { border: none; box-shadow: none; margin: 0; }
  .sidebar { display: none; }
  .report-actions { display: none; }
  .slide { page-break-after: always; padding: 40px 50px; }
  .slide:last-child { page-break-after: auto; }
}
/* Enriched timeline */
.timeline-who {
  font-size: 11px;
  color: var(--brand);
  font-weight: 500;
  margin-top: 3px;
}
.timeline-note {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.55;
  margin-top: 6px;
  padding: 8px 10px;
  background: var(--bg-surface);
  border-radius: var(--radius-md);
  border-left: 2px solid var(--border);
}
.fade-in {
  animation: fadeIn 0.18s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(2px); }
  to { opacity: 1; transform: translateY(0); }
}
.meta-pills {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-tertiary);
  flex-wrap: wrap;
}
.meta-pills .sep { color: var(--text-tertiary); }
.deal-count { font-size: 12px; color: var(--text-tertiary); }
@media (max-width: 880px) {
  .two-col { grid-template-columns: 1fr; }
  .suggestions-grid { grid-template-columns: 1fr; }
  .main { padding: 20px 20px 32px; }
}

function progressSegments(filled, type) {
  let html = '<div class="progress">';
  for (let i = 0; i < 5; i++) {
    html += `<div class="seg ${i < filled ? 'seg-' + type : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

function avatarStack(items) {
  return `<div class="av-stack">${items.map((it, i) => {
    const isOverflow = it.startsWith('+');
    return `<div class="av${isOverflow ? ' av-overflow' : ''}">${it}</div>`;
  }).join('')}</div>`;
}

  const status = c.status;
  let headline, points, strengths, concerns, nextSteps;

  if (status === 'Leading') {
    headline = `Why ${c.name} is leading`;
    points = [
      { title: 'Top of evaluation across criteria', detail: `Strongest signals on financial fit, strategic alignment, and stage progression among candidates in this round.` },
      { title: `Currently at ${c.stage}`, detail: `Advancing on schedule. Round average to reach this stage is 4–6 weeks; ${c.name} hit it in line with that.` },
      { title: 'Mutual intent confirmed', detail: 'Both sides have committed time and resources to advancing the conversation.' }
    ];
    strengths = [`Strong on ${round.title.toLowerCase()} thesis fit`, 'Active engagement', 'On-track progression'];
    concerns = ['Pricing not yet finalized', 'Final integration plan pending'];
    nextSteps = [
      { text: `Continue to ${nextStage(c.stage)} on accelerated path`, reason: 'Front-runner momentum is highest predictor of close' },
      { text: 'Lock down integration plan', reason: 'Pre-close integration plans prevented surprises in past closed rounds' }
    ];
  } else if (status === 'Active') {
    headline = `Current state of ${c.name}`;
    points = [
      { title: `At ${c.stage} stage`, detail: 'Diligence work continuing on standard timeline; no major blockers raised.' },
      { title: 'Not yet differentiated from front-runner', detail: 'Strong on multiple criteria but the leading candidate currently scores higher on financial fit.' },
      { title: 'Could move up if leader stalls', detail: 'Maintained as active candidate to preserve optionality.' }
    ];
    strengths = ['Solid evaluation signals', 'Engaged team', 'Within stage SLA'];
    concerns = ['Behind front-runner on key dimensions', 'No clear differentiator yet'];
    nextSteps = [
      { text: `Advance to ${nextStage(c.stage)}`, reason: 'Maintain optionality; back-up if leader fails to close' }
    ];
  } else if (status === 'Paused') {
    headline = `Why ${c.name} is paused`;
    points = [
      { title: 'Blocker raised in evaluation', detail: 'A specific issue (pricing, compliance, or fit) is preventing further progression until resolved.' },
      { title: `Stalled at ${c.stage}`, detail: 'Cannot advance until blocker is addressed; team is awaiting input from candidate or external party.' },
      { title: 'Pause becoming a risk', detail: 'Extended pauses historically correlate with candidates losing interest or accepting competing offers.' }
    ];
    strengths = ['Otherwise solid candidate', 'Strategic fit intact'];
    concerns = ['Specific blocker unresolved', 'Pause length increasing risk', 'Communication slowing'];
    nextSteps = [
      { text: 'Set hard decision deadline this week', reason: 'Avoid the "indefinite pause" pattern that lost candidates in past rounds' },
      { text: 'If blocker not resolvable: eliminate decisively', reason: 'Frees up capacity for active candidates' }
    ];
  } else if (status === 'Eliminated' || status === 'Walked') {
    const isWalk = status === 'Walked';
    headline = `Why ${c.name} ${isWalk ? 'withdrew' : 'was eliminated'}`;
    points = isWalk ? [
      { title: 'Candidate withdrew from process', detail: 'Reasons recorded include competing offers, valuation gap, or process delays.' },
      { title: `Withdrew at ${c.stage}`, detail: 'Diligence work completed up to this stage is preserved for future reference.' },
      { title: 'Pattern worth analyzing', detail: 'Multiple withdrawals in the same round can indicate process issues — captured in retrospective.' }
    ] : [
      { title: 'Decision to eliminate made early', detail: 'Following the playbook of fast eliminations to preserve diligence capacity for top candidates.' },
      { title: `Eliminated at ${c.stage}`, detail: 'No further engagement planned in this round.' },
      { title: 'May be revisited in future rounds', detail: 'If circumstances change (regulation, valuation, market), candidate could re-enter consideration.' }
    ];
    strengths = ['Diligence learnings preserved'];
    concerns = isWalk ? ['Lost candidate', 'Process gap to investigate'] : ['Strategic fit didn\'t match', 'Resource trade-off'];
    nextSteps = [
      { text: 'Document outcome for retrospective', reason: 'Pattern recognition across rounds requires consistent capture' },
      { text: isWalk ? 'Add to "lost candidate" tracking for future re-engagement' : 'Add to watchlist for landscape changes', reason: 'Past relationships have re-emerged as opportunities later' }
    ];
  } else if (status === 'Acquired') {
    headline = `Why we chose ${c.name}`;
    points = [
      { title: 'Best fit on all criteria', detail: 'Top-ranked across financial, strategic, cultural, and integration dimensions.' },
      { title: 'Closed efficiently', detail: 'Deal closed in line with or ahead of average timeline; minimal post-close surprises.' },
      { title: 'Founder retention strong', detail: 'Key team members signed multi-year retention packages; integration progressing smoothly.' }
    ];
    strengths = ['Closed deal', 'Post-close integration on track', 'Founder team retained'];
    concerns = ['Standard post-close integration risks'];
    nextSteps = [
      { text: 'Complete 90-day integration review', reason: 'Standard post-close milestone' },
      { text: 'Document playbook from this acquisition', reason: 'Replicable patterns are highest-leverage learning' }
    ];
  } else {
    headline = `${c.name} status`;
    points = [{ title: c.status, detail: `Currently at ${c.stage} stage.` }];
    strengths = []; concerns = []; nextSteps = [];
  }

  // Try to parse simple metrics from the detail string
  const arrMatch = (c.detail || '').match(/\$[\d.]+M\s*ARR/);
  const locMatch = (c.detail || '').match(/·\s*([A-Za-z ]+)\s*·/);
  const metrics = [
    arrMatch ? { label: 'ARR', value: arrMatch[0].replace(/\s*ARR/, '') } : null,
    locMatch ? { label: 'Location', value: locMatch[1].trim() } : null,
    { label: 'Stage', value: c.stage },
    { label: 'Status', value: c.status }
  ].filter(Boolean);

  // Derive a default owner only for non-terminal states
  const isTerminal = ['Eliminated', 'Walked', 'Acquired'].includes(status);
  const ownerInitials = (round.owner || '??').split(' ').map(w => w[0]).join('').slice(0, 2);
  let nextOwner = null;
  let nextStep = null;
  if (!isTerminal) {
    const actionByStatus = {
      'Leading': `Driving ${c.name} toward close`,
      'Active': `Continuing diligence on ${c.name}`,
      'Paused': `Awaiting candidate response; decision pending`
    };
    nextOwner = {
      initials: ownerInitials,
      name: round.owner || 'Round owner',
      role: 'Round owner',
      action: actionByStatus[status] || `Reviewing ${c.name}`,
      status: status === 'Paused' ? 'Awaiting response' : 'In review',
      due: 'This week'
    };

    // Derive next-step from stage progression
    const nextStageMap = {
      'Sourcing':    { stage: 'Outreach',    action: 'Initiate first outreach and schedule intro call' },
      'Outreach':    { stage: 'Diligence',   action: 'Sign NDA, open data room, begin formal diligence' },
      'Diligence':   { stage: 'Negotiation', action: 'Open pricing negotiations and draft term sheet' },
      'Negotiation': { stage: 'Close',       action: 'Finalize terms, secure board approval, prepare close' }
    };
    const ns = nextStageMap[c.stage];
    if (ns) {
      nextStep = {
        initials: ownerInitials,
        name: round.owner || 'Round owner',
        role: 'Round owner',
        stage: ns.stage,
        action: ns.action,
        expected: 'Following current step'
      };
    }
  }

  return {
    metrics,
    reasoning: { headline, points },
    strengths,
    concerns,
    nextOwner,
    nextStep,
    timeline: [
      { date: 'Recently', event: `Last activity at ${c.stage} stage`, who: round.owner },
      { date: 'Earlier', event: `Identified in round: ${round.title}`, who: 'Sourcing team' }
    ],
    nextSteps
  };
}

function nextStage(stage) {
  const order = ['Sourcing', 'Outreach', 'Diligence', 'Negotiation', 'Close'];
  const idx = order.indexOf(stage);
  return idx >= 0 && idx < order.length - 1 ? order[idx + 1] : stage;
}

function renderReport(roundId) {
  const round = rounds.find(r => r.id === roundId);
  if (!round || !round.boardReport) { goDetail(roundId); return; }
  const r = round.boardReport;

  // Pipeline stages
  const STAGES = ['Sourcing', 'Outreach', 'Diligence', 'Negotiation', 'Close'];
  const currentIdx = STAGES.indexOf(round.stage);
  const isClosedSuccess = round.statusType === 'success';
  const isClosedDanger = round.statusType === 'danger' && currentIdx === -1 || round.status === 'Rejected';

  const pipelineHtml = STAGES.map((s, i) => {
    let cls = '';
    let content = i + 1;
    if (round.status === 'Closed') {
      cls = 'done';
      if (i === STAGES.length - 1) { cls = 'done terminal-success'; content = '✓'; }
      else { content = '✓'; }
    } else if (round.status === 'Rejected') {
      const stuckAt = STAGES.indexOf(round.stage);
      if (i < stuckAt) { cls = 'done'; content = '✓'; }
      else if (i === stuckAt) { cls = 'terminal-danger'; content = '✕'; }
    } else if (currentIdx >= 0) {
      if (i < currentIdx) { cls = 'done'; content = '✓'; }
      else if (i === currentIdx) cls = 'current';
    }
    let sub = '';
    if (cls.includes('terminal-success')) sub = 'Closed';
    else if (cls.includes('terminal-danger')) sub = 'Round ended';
    else if (cls.includes('done')) sub = 'Complete';
    else if (cls === 'current') sub = 'In progress';
    return `
      <div class="pipe-stage ${cls}">
        <div class="dot">${content}</div>
        <div class="name">${s}</div>
        ${sub ? `<div class="sub">${sub}</div>` : ''}
      </div>
    `;
  }).join('');

  // Price scenarios bar chart (if present)
  let scenariosHtml = '';
  if (r.priceScenarios && r.priceScenarios.length) {
    const max = Math.max(...r.priceScenarios.map(s => s.value));

      <!-- Slide 4: Status -->
      <section class="slide slide-status">
        <div class="slide-num">03 — Current status</div>
        <h2 class="slide-title">Where we are in the pipeline</h2>
        <div class="pipeline">${pipelineHtml}</div>
        <div class="status-headline">${r.statusHeadline}</div>
        <p class="status-detail">${r.statusDetail}</p>
      </section>

      <!-- Slide 5: Financial picture -->
      <section class="slide">
        <div class="slide-num">04 — Financial picture</div>
        <h2 class="slide-title">The numbers that matter</h2>
        ${r.headlineMetric ? `
          <div class="headline-metric">
            <div class="hm-label">${r.headlineMetric.label}</div>
            <div class="hm-value">${r.headlineMetric.value}</div>
            <div class="hm-sub">${r.headlineMetric.sub}</div>
          </div>
        ` : ''}
        ${scenariosHtml}
        <div class="fin-metrics">
          ${r.financial.map(f => `
            <div class="fin-metric">
              <div class="fin-metric-label">${f.label}</div>
              <div class="fin-metric-value">${f.value}</div>
              <div class="fin-metric-sub">${f.sub}</div>
            </div>
          `).join('')}
        </div>
      </section>

      <!-- Slide 6: Risk -->
      <section class="slide slide-risk">
        <div class="slide-num">05 — Risk assessment</div>
        <h2 class="slide-title">Key risks &amp; how we're handling them</h2>
        <div class="risk-grid">
          ${r.risks.map(risk => `
            <div class="risk-card">
              <div class="risk-card-bar ${risk.level}"></div>
              <div class="risk-card-content">
                <div class="risk-card-head">
                  <div class="risk-card-icon ${risk.level}">${riskIcon(risk.level)}</div>
                  <span class="risk-card-level ${risk.level}">${risk.level} risk</span>
                  <div class="risk-card-text">${risk.text}</div>
                </div>
                <div class="risk-card-mit">
                  <span class="risk-card-mit-label">Mitigation</span>${risk.mitigation}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </section>

      <!-- Slide 7: Decisions -->
      <section class="slide">
        <div class="slide-num">06 — Decisions requested</div>
        <h2 class="slide-title">What we need from the board</h2>
        <div class="decisions-grid">
          ${r.decisions.map((d, i) => `
            <div class="decision-card ${d.type}">
              <div class="decision-card-num">${String(i + 1).padStart(2, '0')}</div>
              <div class="decision-card-body">
                <div class="decision-card-tags">
                  <span class="decision-card-tag kind">${decisionTagLabel(d.type)}</span>
                  <span class="decision-card-tag">${d.deadline}</span>
                </div>
                <div class="decision-card-ask">${d.ask}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </section>

      <!-- Slide 8: Recommendation -->
      <section class="slide slide-rec">
        <div class="slide-num">07 — Recommendation</div>
        <div class="rec-mark"></div>
        <h2 class="slide-title">Our recommendation to the board</h2>
        <p class="rec-statement">${r.recommendation}</p>
      </section>

      <div class="report-footer">SHERPANY · CONFIDENTIAL — BOARD MATERIALS · ${r.date}</div>
    </div>
  `;
  document.getElementById('report-view').innerHTML = html;
}

// ============================================================================
// ROUTING
// ============================================================================
// pushState is blocked inside sandboxed iframes (e.g. about:srcdoc artifact previews).
// Wrap it so URL updates work in a real browser but fail silently in the sandbox.
function safePush(hash) {
  try { history.pushState({}, '', hash); } catch (e) { /* sandbox: ignore */ }
}

function setActiveNav(idx) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
}

function setView(name) {
  ['list-view', 'detail-view', 'candidate-view', 'report-view', 'meetings-view'].forEach(v => {
    document.getElementById(v).style.display = 'none';
  });
  const el = document.getElementById(name);
  el.style.display = 'block';
  el.classList.remove('fade-in');
  void el.offsetWidth;
  el.classList.add('fade-in');
  try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {}
}

function goList() {
  safePush('#');
  setActiveNav(1);
  setView('list-view');
}

function goDetail(id) {
  safePush('#/round/' + id);
  setActiveNav(1);
  renderDetail(id);
  setView('detail-view');
}

function goCandidate(roundId, candidateId) {
  safePush('#/round/' + roundId + '/candidate/' + candidateId);
  setActiveNav(1);
  renderCandidate(roundId, candidateId);
  setView('candidate-view');
}

function goReport(roundId) {
  safePush('#/round/' + roundId + '/report');
  setActiveNav(1);
  renderReport(roundId);
  setView('report-view');
}

function goMeetings() {
  safePush('#/meetings');
  setActiveNav(0);
  setView('meetings-view');
}

function handleRoute() {
  const hash = window.location.hash || '';
  const reportMatch = hash.match(/^#\/round\/([^/]+)\/report$/);
  const candidateMatch = hash.match(/^#\/round\/([^/]+)\/candidate\/([^/]+)$/);
  if (reportMatch) {
    renderReport(reportMatch[1]);
    setActiveNav(1);
    setView('report-view');
  } else if (candidateMatch) {
    renderCandidate(candidateMatch[1], candidateMatch[2]);
    setActiveNav(1);
    setView('candidate-view');
  } else if (hash.startsWith('#/round/')) {
    const id = hash.replace('#/round/', '');
    renderDetail(id);
    setActiveNav(1);
    setView('detail-view');
  } else if (hash === '#/meetings') {
    setActiveNav(0);
    setView('meetings-view');
  } else {
    setActiveNav(1);
    setView('list-view');
  }
}

// ============================================================================
// INIT
// ============================================================================
renderList();
window.addEventListener('popstate', handleRoute);
window.addEventListener('hashchange', handleRoute);
handleRoute();
</script>

</body>
</html>
